project:
  name: "binance_futures_bot"
  version: "0.1.0"
  mode: "paper"

runtime:
  mode: "paper"
  exchange: "binance_usdm"
  poll_interval_seconds: 15
  backtest_risk_bucket: "normal"
  paper_risk_bucket: "strong"

capital:
  initial_capital: 10000.0
  quote_asset: "USDT"

symbols:
  enabled:
    - "BTCUSDT"
    - "ETHUSDT"

timeframes:
  context: "4h"
  bias: "1h"
  entry: "15m"

strategy:
  name: "continuation_breakout_core_v3"
  allowed_setups:
    - "BREAKOUT"
    - "PULLBACK"
  dynamic_risk_by_score:
    enabled: true
    preserve_symbol_base_risk: true
  allowed_setups_by_symbol:
    BTCUSDT:
      - "BREAKOUT"
    ETHUSDT:
      - "BREAKOUT"
      - "PULLBACK"
  backtest_policy:
    enabled: true
    enforce_context_alignment: false
    allowed_sides:
      BTCUSDT:
        - "LONG"
        - "SHORT"
      ETHUSDT:
        - "LONG"
        - "SHORT"

score_thresholds:
  min_trade: 68
  aggressive: 85
  exceptional: 93

risk:
  risk_by_score:
    small: 0.0040
    normal: 0.0060
    strong: 0.0085
    exceptional: 0.0110
  backtest_by_symbol:
    ETHUSDT:
      risk_pct: 0.0100

  max_open_positions: 4

  max_open_risk:
    normal: 0.0300
    offensive: 0.0375
    absolute: 0.0450

  loss_limits:
    daily: 0.0200
    weekly: 0.0500

leverage:
  BTCUSDT: 10
  ETHUSDT: 10
  SOLUSDT: 5
  BNBUSDT: 5
  XRPUSDT: 5

position_limits:
  max_notional_pct:
    BTCUSDT: 0.80
    ETHUSDT: 0.90

execution:
  fee_rate_entry: 0.0004
  fee_rate_exit: 0.0004

  slippage:
    BTCUSDT: 0.0002
    ETHUSDT: 0.0003
    SOLUSDT: 0.0005
    BNBUSDT: 0.0005
    XRPUSDT: 0.0006

filters:
  min_rr_net: 1.8
  stop_buffer_atr_fraction: 0.10
  min_candles: 1
  max_candles: 24
  min_breakout_volume_multiple: 0.7
  max_consolidation_range_atr_multiple: 2.0
  max_trigger_candle_atr_multiple: 1.8
  by_symbol:
    BTCUSDT:
      min_candles: 1
      max_candles: 20
      min_breakout_volume_multiple: 0.8
      max_consolidation_range_atr_multiple: 2.2
    ETHUSDT:
      min_candles: 1
      max_candles: 24
      min_breakout_volume_multiple: 0.6
      max_consolidation_range_atr_multiple: 2.6

pullback:
  impulse_lookback_candles: 8
  min_pullback_candles: 1
  max_pullback_candles: 8
  min_impulse_atr_multiple: 1.0
  min_retrace_ratio: 0.15
  max_retrace_ratio: 0.75
  by_symbol:
    ETHUSDT:
      min_impulse_atr_multiple: 0.9
      min_retrace_ratio: 0.15
      max_retrace_ratio: 0.80

trade_management:
  max_bars_in_trade: 24
  by_symbol:
    BTCUSDT:
      max_bars_in_trade: 16
    ETHUSDT:
      max_bars_in_trade: 32

data:
  raw_data_path: "data/raw"
  processed_data_path: "data/processed"
  outputs_path: "outputs"
  refresh_from_binance_rest: true
  candle_close_grace_seconds: 5
  refresh_error_backoff_seconds: 120

reporting:
  save_trades_csv: true
  save_metrics_json: true
  save_equity_chart: true

binance:
  use_testnet: true
  use_testnet_market_data: false
  recv_window_ms: 5000
  timeout_seconds: 30
  market_data_limit: 500
  rest_max_retries: 2
  rest_retry_backoff_ms: 1000
